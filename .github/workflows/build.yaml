name: SwiftPay CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build Transaction Gateway
        working-directory: transaction-gateway
        run: mvn clean package -DskipTests

      - name: Build Ledger Service
        working-directory: ledger-service
        run: mvn clean package -DskipTests